<title>CEZOO Blinkit Style</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:#f7fbff;
}

/* Full Screen Background */
.bg-container{
    position:fixed;
    inset:0;
    overflow:hidden;
}

/* Moving Layer */
.bg-track{
    position:absolute;
    top:-80px;
    left:-80px;

    display:grid;
    grid-template-columns:repeat(12,130px);
    gap:24px;

    width:max-content;

    animation:moveLeft 20s linear infinite;
}

/* Blinkit Style Cards */
.product-card{
    width:130px;
    height:130px;

    background:#DDF4FF; /* Sky Blue */

    border-radius:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    border:1px solid #B9E8FF;

    box-shadow:
    0 4px 12px rgba(0,150,255,0.12);
}

.product-card img{
    width:110px;
    height:110px;
    object-fit:contain;
}
.product-card img{
    width:80px;
    height:80px;
    object-fit:contain;
}

/* Continuous movement */
@keyframes moveLeft{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-220px);
    }
}

/* Mobile */
@media(max-width:768px){

.product-card{
    width:72px;
    height:72px;
    border-radius:14px;
}

.product-card img{
    width:42px;
    height:42px;
}

.bg-track{
    grid-template-columns:repeat(10,72px);
    gap:18px;
}

}
/* LOGIN SECTION */


.login-section{
    font-family: 'Inter', sans-serif;
}
/* Logo Up Down Animation */

.login-logo{
    width:70px;
    height:70px;
    object-fit:contain;
    margin-bottom:12px;
}

@keyframes floatLogo{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }
}

.login-section{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:400px;
    text-align:center;
}

.tagline{
    font-size:15px;
    color:#666;
    margin-bottom:8px;
}

.login-section h2{
    font-size:28px;
    color:#111;
    margin-bottom:18px;
}

.login-section input{
    width:100%;
    height:52px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:0 15px;
    font-size:16px;
    margin-bottom:12px;
}

.login-section button{
    width:100%;
    height:52px;
    border:none;
    border-radius:12px;
    background:#FFD600;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
}

.terms{
    margin-top:12px;
    font-size:12px;
    color:#777;
}

.terms a{
    color:#333;
    text-decoration:none;
    font-weight:600;
}
/* PC / Laptop Not Allowed */
.pc-block{
    display:none;
}

@media (min-width:769px){

body>*{
    display:none;
}

.pc-block{
    display:flex !important;
    position:fixed;
    inset:0;
    background:#f7fbff;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    font-family:'Inter',sans-serif;
    text-align:center;
    padding:20px;
}

.pc-block h1{
    font-size:32px;
    color:#111;
    margin-bottom:12px;
}

.pc-block p{
    color:#666;
    font-size:17px;
}

}
/* Show only on mobile portrait */
/* Show on all mobiles (portrait + landscape) */
/* Show on mobile devices only */
.mobile-products{
    display: contents;
}

/* Hide on desktops/laptops, even if the window is narrow */
@media (hover: hover) and (pointer: fine),
       (min-width: 769px){
    .mobile-products{
        display: none !important;
    }
}

</style>
